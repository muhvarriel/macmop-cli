name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-15
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    env:
      MACMOP_TEST_MODE: "1"
      MACMOP_DATA_DIR: /tmp/macmop-release-data
      MACMOP_TRASH_DIR: /tmp/macmop-release-trash
      MACMOP_AUDIT_FILE: /tmp/macmop-release-data/audit/last.json
      MACMOP_ROLLBACK_FILE: /tmp/macmop-release-data/rollback/entries.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Check code formatting
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo fmt --all -- --check

      - name: Run clippy linter
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary artifact
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TARGET=${{ matrix.target }}
          BINARY_TARBALL="macmop-v${VERSION}-${TARGET}.tar.gz"
          mkdir -p dist
          tar -czf "dist/${BINARY_TARBALL}" -C target/${TARGET}/release macmop
          (cd dist && shasum -a 256 "${BINARY_TARBALL}" > "${BINARY_TARBALL}.sha256")
          echo "BINARY_TARBALL=${BINARY_TARBALL}" >> "$GITHUB_ENV"

      - name: Smoke test binary archive
        run: |
          mkdir -p test-extract
          tar -xzf "dist/${BINARY_TARBALL}" -C test-extract
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            echo "Running version check:"
            ./test-extract/macmop --version
            echo "Running help check:"
            ./test-extract/macmop --help
          else
            echo "Verifying x86_64 archive layout:"
            ls -lh test-extract/macmop
            file test-extract/macmop
          fi

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/

  publish:
    name: Publish Release
    needs: build
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true

      - name: Package source artifact
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          SOURCE_TARBALL="macmop-v${VERSION}-source.tar.gz"
          git archive --format=tar.gz --prefix="macmop-v${VERSION}/" -o "dist/${SOURCE_TARBALL}" HEAD
          (cd dist && shasum -a 256 "${SOURCE_TARBALL}" > "${SOURCE_TARBALL}.sha256")
          echo "Artifacts:"
          ls -lh dist/

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            dist/macmop-v*.tar.gz
            dist/macmop-v*.tar.gz.sha256
