name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & Publish Release
    runs-on: macos-15
    permissions:
      contents: write

    env:
      MACMOP_TEST_MODE: "1"
      MACMOP_DATA_DIR: /tmp/macmop-release-data
      MACMOP_TRASH_DIR: /tmp/macmop-release-trash
      MACMOP_AUDIT_FILE: /tmp/macmop-release-data/audit/last.json
      MACMOP_ROLLBACK_FILE: /tmp/macmop-release-data/rollback/entries.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package artifacts
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          echo "Packaging version $VERSION"
          mkdir -p dist

          # 1. Package source tarball
          SOURCE_TARBALL="macmop-v${VERSION}-source.tar.gz"
          git archive --format=tar.gz --prefix="macmop-v${VERSION}/" -o "dist/${SOURCE_TARBALL}" HEAD
          (cd dist && shasum -a 256 "${SOURCE_TARBALL}" > "${SOURCE_TARBALL}.sha256")

          # 2. Package binary tarball
          BINARY_TARBALL="macmop-v${VERSION}-aarch64-apple-darwin.tar.gz"
          tar -czf "dist/${BINARY_TARBALL}" -C target/aarch64-apple-darwin/release macmop
          (cd dist && shasum -a 256 "${BINARY_TARBALL}" > "${BINARY_TARBALL}.sha256")

          ls -l dist

      - name: Artifact smoke test
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          BINARY_TARBALL="macmop-v${VERSION}-aarch64-apple-darwin.tar.gz"
          
          mkdir -p test-extract
          tar -xzf "dist/${BINARY_TARBALL}" -C test-extract
          
          echo "Running version check:"
          ./test-extract/macmop --version
          
          echo "Running help check:"
          ./test-extract/macmop --help

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            dist/macmop-v*.tar.gz
            dist/macmop-v*.tar.gz.sha256
