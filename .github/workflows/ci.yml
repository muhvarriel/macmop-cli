name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Build & Test
    runs-on: macos-latest

    env:
      MACMOP_TEST_MODE: "1"
      MACMOP_DATA_DIR: /tmp/macmop-ci-data
      MACMOP_TRASH_DIR: /tmp/macmop-ci-trash
      MACMOP_AUDIT_FILE: /tmp/macmop-ci-data/audit/last.json
      MACMOP_ROLLBACK_FILE: /tmp/macmop-ci-data/rollback/entries.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release

      - name: Fetch dependencies for packaging
        run: cargo fetch --locked

      - name: Verify cargo package
        run: cargo package --locked

      - name: Verify Homebrew Formula syntax
        run: |
          if command -v ruby >/dev/null 2>&1; then
            ruby -c Formula/macmop.rb
          else
            echo "Ruby not found; skipping formula syntax check"
          fi
